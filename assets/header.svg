<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .float { animation: float 3s ease-in-out infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .slide { animation: slide 8s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0f0f23"/>

  <!-- Animated grid lines -->
  <g stroke="#1a1a3e" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>

  <!-- Floating particles -->
  <circle cx="100" cy="100" r="3" fill="#667eea" class="pulse"/>
  <circle cx="200" cy="300" r="2" fill="#f093fb" class="pulse" style="animation-delay: 0.5s"/>
  <circle cx="300" cy="150" r="4" fill="#764ba2" class="pulse" style="animation-delay: 1s"/>
  <circle cx="500" cy="250" r="3" fill="#f5576c" class="pulse" style="animation-delay: 1.5s"/>
  <circle cx="700" cy="100" r="2" fill="#667eea" class="pulse" style="animation-delay: 2s"/>

  <!-- Main lightning bolt -->
  <g class="float">
    <polygon points="400,50 350,200 420,200 380,350 450,180 380,180" fill="url(#grad1)" stroke="#fff" stroke-width="2"/>
  </g>

  <!-- Text -->
  <text x="400" y="380" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
    ⚡ Cherie ⚡
  </text>

  <!-- Animated code lines -->
  <g class="slide" opacity="0.3">
    <text x="0" y="50" fill="#667eea" font-family="monospace" font-size="12">
      <tspan x="0" y="50">const fixEverything = (problem) => {</tspan>
      <tspan x="0" y="70">  if (problem.stupid) return "don't do that";</tspan>
      <tspan x="0" y="90">  return solution;</tspan>
      <tspan x="0" y="110">};</tspan>
    </text>
  </g>
</svg>