<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <style>
      @keyframes countUp {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
      }
      .stat-item {
        animation: countUp 0.5s ease-out forwards;
      }
    </style>
  </defs>

  <rect width="400" height="200" fill="#0f0f23" rx="15"/>

  <!-- Card header -->
  <rect x="20" y="20" width="360" height="40" fill="url(#cardGrad)" rx="10"/>
  <text x="200" y="47" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
    📊 GitHub Stats
  </text>

  <!-- Stats grid -->
  <g transform="translate(30, 80)">
    <!-- Repos -->
    <g class="stat-item" style="animation-delay: 0.1s">
      <rect x="0" y="0" width="100" height="80" fill="#1a1a3e" rx="8"/>
      <text x="50" y="30" text-anchor="middle" fill="#4ecdc4" font-family="Arial" font-size="24" font-weight="bold">∞</text>
      <text x="50" y="55" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12">Repos</text>
    </g>

    <!-- Stars -->
    <g class="stat-item" transform="translate(110, 0)" style="animation-delay: 0.2s">
      <rect x="0" y="0" width="100" height="80" fill="#1a1a3e" rx="8"/>
      <text x="50" y="30" text-anchor="middle" fill="#ffd43b" font-family="Arial" font-size="24" font-weight="bold">⭐</text>
      <text x="50" y="55" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12">Stars</text>
    </g>

    <!-- Followers -->
    <g class="stat-item" transform="translate(220, 0)" style="animation-delay: 0.3s">
      <rect x="0" y="0" width="100" height="80" fill="#1a1a3e" rx="8"/>
      <text x="50" y="30" text-anchor="middle" fill="#ff6b6b" font-family="Arial" font-size="24" font-weight="bold">👥</text>
      <text x="50" y="55" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12">Followers</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="200" y="185" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">
    Updated: Just now | Status: Crushing it
  </text>
</svg>